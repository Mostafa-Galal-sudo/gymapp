name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore my-release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-key-alias \
            -storepass OmnibodyApp2024 \
            -keypass OmnibodyApp2024 \
            -dname "CN=Omnibody App, OU=Omnibody, O=Omnibody, L=Alexandria, S=Alexandria, C=EG"

      - name: Convert to Base64 and Print
        run: |
          echo "========================================="
          echo "KEYSTORE BASE64 OUTPUT:"
          echo "========================================="
          base64 -w 0 my-release-key.jks
          echo ""
          echo "========================================="
